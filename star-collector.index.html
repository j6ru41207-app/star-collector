<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0a2e">
<title>集點大作戰 ⭐</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi6ZuG6bue5aSn5L2c5oiwIiwic2hvcnRfbmFtZSI6IuaYn+aYn+mbhiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYwYTJlIiwidGhlbWVfY29sb3IiOiIjMGYwYTJlIn0=">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0a2e;--card:rgba(255,255,255,0.06);--gold:#ffd700;--warm:#ff8c42;--pink:#ff6b9d;--blue:#64b5f6;--green:#69f0ae;--purple:#7c4dff;--txt:#f0e6ff;--txt2:rgba(240,230,255,0.6);--kG:linear-gradient(135deg,#64b5f6,#7c4dff);--nG:linear-gradient(135deg,#ff6b9d,#ff8a65);--r:20px}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(100,70,200,0.15) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,107,157,0.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(255,215,0,0.05) 0%,transparent 70%);z-index:0;pointer-events:none}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 100px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.header .sub{color:var(--txt2);font-size:0.85rem;margin-top:4px}
.date-bar{text-align:center;color:var(--txt2);font-size:0.8rem;margin-bottom:24px;letter-spacing:1px}

.child-card{border-radius:var(--r);padding:24px;margin-bottom:20px;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.child-card::before{content:'';position:absolute;inset:0;border-radius:var(--r);padding:1.5px;background:var(--cb);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.child-card.kyrie{background:linear-gradient(135deg,rgba(100,181,246,0.1),rgba(124,77,255,0.08));--cb:linear-gradient(135deg,rgba(100,181,246,0.4),rgba(124,77,255,0.2))}
.child-card.nella{background:linear-gradient(135deg,rgba(255,107,157,0.1),rgba(255,138,101,0.08));--cb:linear-gradient(135deg,rgba(255,107,157,0.4),rgba(255,138,101,0.2))}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cn{font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:8px}
.cn .av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.kyrie .av{background:var(--kG)}.nella .av{background:var(--nG)}
.sc{display:flex;align-items:center;gap:6px;font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.3)}
.sc .si{font-size:1.6rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.sv{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;min-height:28px}
.ms{font-size:1.1rem;animation:fi .3s ease forwards;opacity:0}
@keyframes fi{to{opacity:1}}
.acts{display:flex;gap:10px}
.btn{flex:1;padding:12px;border:none;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.95)}
.ba{background:linear-gradient(135deg,rgba(105,240,174,0.2),rgba(105,240,174,0.1));color:var(--green);border:1.5px solid rgba(105,240,174,0.3)}
.br{background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(255,107,157,0.1));color:var(--pink);border:1.5px solid rgba(255,107,157,0.3)}
.st{font-size:1.1rem;font-weight:800;margin:30px 0 14px;display:flex;align-items:center;gap:8px}
.hl{display:flex;flex-direction:column;gap:8px}
.hi{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:14px;background:var(--card);font-size:.9rem}
.hi .l{display:flex;align-items:center;gap:10px}
.bd{padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
.bd.kyrie{background:rgba(100,181,246,0.2);color:var(--blue)}.bd.nella{background:rgba(255,107,157,0.2);color:var(--pink)}
.pts{font-weight:800}.pts.pos{color:var(--green)}.pts.neg{color:var(--pink)}
.hi .rs{color:var(--txt2);font-size:.8rem;margin-top:2px}
.es{text-align:center;padding:40px 20px;color:var(--txt2);font-size:.9rem}

/* Leaderboard */
.lb{display:none;padding:20px 0}.lb.active{display:block}
.ts{text-align:center;margin-bottom:30px}
.ti{font-size:4rem;display:block;margin-bottom:8px;animation:tb 2s ease-in-out infinite}
@keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ts .lt{font-size:.9rem;color:var(--txt2)}
.lc{border-radius:var(--r);padding:28px 24px;margin-bottom:16px;text-align:center}
.lc.f1{background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,140,66,0.1));border:1.5px solid rgba(255,215,0,0.3)}
.lc.f2{background:linear-gradient(135deg,rgba(192,192,192,0.1),rgba(160,160,180,0.06));border:1.5px solid rgba(192,192,192,0.2)}
.lr{font-size:2.5rem;margin-bottom:4px}.la{font-size:2.5rem;margin-bottom:8px}
.ln{font-size:1.4rem;font-weight:800;margin-bottom:4px}
.ls{font-size:2rem;font-weight:900;color:var(--gold)}.lsl{font-size:.8rem;color:var(--txt2);margin-top:2px}
.vsd{text-align:center;font-size:1.2rem;font-weight:900;color:var(--txt2);margin:8px 0;letter-spacing:4px}
.ps{margin-top:24px}.pr{margin-bottom:16px}
.pl{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.85rem;font-weight:700}
.pbg{width:100%;height:14px;border-radius:10px;background:rgba(255,255,255,0.06);overflow:hidden}
.pf{height:100%;border-radius:10px;transition:width .8s ease}
.pf.kyrie{background:var(--kG)}.pf.nella{background:var(--nG)}
.sd{text-align:center;padding:16px;border-radius:14px;background:var(--card);margin-top:20px}
.sd .dl{font-size:.85rem;color:var(--txt2);margin-bottom:4px}
.sd .dv{font-size:1.3rem;font-weight:800;color:var(--gold)}

/* Overlay & Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;align-items:flex-end;justify-content:center}
.ov.active{display:flex}
.md{background:#1a1245;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:30px 24px 40px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md h2{font-size:1.3rem;font-weight:800;margin-bottom:20px;text-align:center}
.md label{display:block;font-size:.85rem;font-weight:600;color:var(--txt2);margin-bottom:6px;margin-top:14px}
.md input{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--txt);font-family:inherit;font-size:1rem;outline:none}
.md input:focus{border-color:var(--gold)}
.sp{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0}
.sp button{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--txt);font-size:1.3rem;font-weight:800;cursor:pointer}
.sp button:active{transform:scale(.9)}
.pv{font-size:2rem;font-weight:900;color:var(--gold);min-width:60px;text-align:center}
.ma{display:flex;gap:10px;margin-top:24px}
.bc{flex:1;padding:14px;border:none;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--warm));color:#1a1245}
.bc:active{transform:scale(.97)}
.bx{flex:1;padding:14px;border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;background:transparent;color:var(--txt2);font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer}

/* Lock */
.lo{display:none;position:fixed;inset:0;background:rgba(15,10,46,0.97);backdrop-filter:blur(20px);z-index:200;flex-direction:column;align-items:center;justify-content:center}
.lo.active{display:flex}
.lo h2{font-size:1.3rem;font-weight:800;margin-bottom:8px}
.lo>p{color:var(--txt2);font-size:.85rem;margin-bottom:24px}
.psel{display:flex;gap:12px;margin-bottom:24px}
.pb{padding:10px 20px;border-radius:30px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--txt2);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer}
.pb.sel{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.1)}
.fis{text-align:center}
.fib{padding:14px 32px;border-radius:16px;border:1.5px solid rgba(124,77,255,0.4);background:linear-gradient(135deg,rgba(124,77,255,0.15),rgba(100,181,246,0.1));color:var(--blue);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.fib:active{transform:scale(.95)}
.fih{color:var(--txt2);font-size:.75rem;margin-top:8px}
.fid{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:var(--txt2);font-size:.8rem}
.fid::before,.fid::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
.pds{display:flex;gap:14px;margin-bottom:30px}
.pd{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);transition:all .2s}
.pd.fl{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,0.4)}
.pp{display:grid;grid-template-columns:repeat(3,70px);gap:12px}
.pk{width:70px;height:70px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--txt);font-family:inherit;font-size:1.5rem;font-weight:700;cursor:pointer}
.pk:active{background:rgba(255,255,255,0.15);transform:scale(.93)}
.pk.emp{visibility:hidden}
.le{color:var(--pink);font-size:.85rem;margin-top:16px;min-height:20px;text-align:center}
.lcb{margin-top:20px;padding:10px 30px;border:none;background:transparent;color:var(--txt2);font-family:inherit;font-size:.9rem;cursor:pointer}

/* Settings */
.ss{display:none;padding:20px 0}.ss.active{display:block}
.sg{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:16px}
.sg h3{font-size:.9rem;font-weight:700;color:var(--txt2);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.si2{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.si2:last-child{border-bottom:none}
.si2 .lb2{font-weight:600}.si2 .vl{color:var(--txt2);font-size:.9rem}
.bdg{width:100%;padding:14px;border:1.5px solid rgba(255,107,157,0.3);border-radius:14px;background:rgba(255,107,157,0.1);color:var(--pink);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:10px}
.bsf{width:100%;padding:14px;border:1.5px solid rgba(124,77,255,0.3);border-radius:14px;background:rgba(124,77,255,0.1);color:var(--blue);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:10px}
.fst{font-size:.85rem;margin-top:4px}.fst.on{color:var(--green)}.fst.off{color:var(--txt2)}

.ms2{display:block}.ms2.hid{display:none}

/* Nav */
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,10,46,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:12px 20px 28px;z-index:50}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;color:var(--txt2);font-family:inherit;font-size:.7rem;font-weight:600;cursor:pointer}
.ni.act{color:var(--gold)}
.ni .ic{font-size:1.3rem}

.spk{position:fixed;width:4px;height:4px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:0;opacity:0;animation:spk 3s ease-in-out infinite}
@keyframes spk{0%,100%{opacity:0;transform:translateY(0) scale(0)}50%{opacity:.6;transform:translateY(-20px) scale(1)}}
.cel{position:fixed;inset:0;pointer-events:none;z-index:300;display:none}.cel.active{display:block}
.cf{position:absolute;width:8px;height:8px;border-radius:2px;animation:cff 1.5s ease forwards}
@keyframes cff{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="spks"></div>
<div class="cel" id="cel"></div>

<!-- LOCK -->
<div class="lo" id="lo">
<h2>🔐 家長驗證</h2>
<p>請選擇身份並驗證</p>
<div class="psel">
<button class="pb sel" data-p="爸比">爸比</button>
<button class="pb" data-p="媽咪">媽咪</button>
<button class="pb" data-p="姥姥">姥姥</button>
</div>
<div class="fis" id="fis">
<button class="fib" id="fib"><span>🧬</span> 使用 Face ID 解鎖</button>
<div class="fih" id="fih"></div>
</div>
<div class="fid">或輸入密碼</div>
<div class="pds" id="pds"><div class="pd"></div><div class="pd"></div><div class="pd"></div><div class="pd"></div></div>
<div class="pp">
<button class="pk" data-k="1">1</button><button class="pk" data-k="2">2</button><button class="pk" data-k="3">3</button>
<button class="pk" data-k="4">4</button><button class="pk" data-k="5">5</button><button class="pk" data-k="6">6</button>
<button class="pk" data-k="7">7</button><button class="pk" data-k="8">8</button><button class="pk" data-k="9">9</button>
<button class="pk emp"></button><button class="pk" data-k="0">0</button><button class="pk" data-k="back">⌫</button>
</div>
<div class="le" id="le"></div>
<button class="lcb" id="lcb">取消</button>
</div>

<!-- MODAL -->
<div class="ov" id="mov">
<div class="md">
<h2 id="mt">加星星 ⭐</h2>
<label>星星數量</label>
<div class="sp">
<button id="pm">−</button>
<div class="pv" id="pvl">1</div>
<button id="pp2">+</button>
</div>
<label>備註（選填）</label>
<input type="text" id="ri" placeholder="例如：今天很乖、幫忙做家事">
<div class="ma">
<button class="bx" id="mc">取消</button>
<button class="bc" id="mok">確認</button>
</div>
</div>
</div>

<div class="app">
<!-- HOME -->
<div class="ms2" id="home">
<div class="header"><h1>集點大作戰</h1><div class="sub">✨ 每顆星星都是努力的證明 ✨</div></div>
<div class="date-bar" id="db"></div>
<div class="child-card kyrie">
<div class="ch"><div class="cn"><div class="av">🦁</div>Kyrie</div><div class="sc"><span class="si">⭐</span><span id="ks">0</span></div></div>
<div class="sv" id="ksv"></div>
<div class="acts"><button class="btn ba" onclick="oM('kyrie','add')">＋ 加星星</button><button class="btn br" onclick="oM('kyrie','remove')">－ 扣星星</button></div>
</div>
<div class="child-card nella">
<div class="ch"><div class="cn"><div class="av">🦊</div>Nella</div><div class="sc"><span class="si">⭐</span><span id="ns">0</span></div></div>
<div class="sv" id="nsv"></div>
<div class="acts"><button class="btn ba" onclick="oM('nella','add')">＋ 加星星</button><button class="btn br" onclick="oM('nella','remove')">－ 扣星星</button></div>
</div>
<div class="st">📋 紀錄</div>
<div class="hl" id="hl"><div class="es">還沒有任何紀錄，開始集點吧！</div></div>
</div>

<!-- LEADERBOARD -->
<div class="lb" id="lbd">
<div class="header"><h1>🏆 星星排行榜</h1><div class="sub">看看誰收集了最多星星！</div></div>
<div class="ts"><span class="ti" id="tii">🏆</span><span class="lt" id="ltt"></span></div>
<div id="lcs"></div>
<div class="ps">
<div class="pr"><div class="pl"><span>🦁 Kyrie</span><span id="kpc">0%</span></div><div class="pbg"><div class="pf kyrie" id="kb" style="width:0%"></div></div></div>
<div class="pr"><div class="pl"><span>🦊 Nella</span><span id="npc">0%</span></div><div class="pbg"><div class="pf nella" id="nb" style="width:0%"></div></div></div>
</div>
<div class="sd"><div class="dl">兩人差距</div><div class="dv" id="dfv">0 ⭐</div></div>
</div>

<!-- SETTINGS -->
<div class="ss" id="ssc">
<div class="header"><h1>⚙️ 設定</h1></div>
<div class="sg">
<h3>家長密碼</h3>
<div class="si2"><span class="lb2">爸比</span><span class="vl">預設 1234</span></div>
<div class="si2"><span class="lb2">媽咪</span><span class="vl">預設 5678</span></div>
<div class="si2"><span class="lb2">姥姥</span><span class="vl">預設 0000</span></div>
</div>
<div class="sg">
<h3>Face ID / 生物辨識</h3>
<div class="fst off" id="fstxt">尚未設定</div>
<button class="bsf" id="sfb">🧬 設定 Face ID</button>
<p style="color:var(--txt2);font-size:.78rem;margin-top:10px">設定後可用 Face ID / 指紋快速解鎖。<br>需要裝置支援生物辨識。</p>
</div>
<div class="sg">
<h3>資料管理</h3>
<button class="bdg" onclick="cR()">🗑️ 清除所有資料</button>
</div>
</div>
</div>

<!-- NAV -->
<div class="bn">
<button class="ni act" id="n1" onclick="sT('home')"><span class="ic">🏠</span>首頁</button>
<button class="ni" id="n2" onclick="sT('leaderboard')"><span class="ic">🏆</span>排行榜</button>
<button class="ni" id="n3" onclick="sT('settings')"><span class="ic">⚙️</span>設定</button>
</div>

<script>
const SK='starCD',FK='starFID';
function gD(){return{children:{kyrie:{name:'Kyrie',stars:0},nella:{name:'Nella',stars:0}},history:[],parents:{'爸比':'1234','媽咪':'5678','姥姥':'0000'}}}
function ld(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}return gD()}
function sv(d){localStorage.setItem(SK,JSON.stringify(d))}
let D=ld(),cM={},pC=1,pI='',sP='爸比',lCb=null,fOn=localStorage.getItem(FK)==='true',cTab='home';

// Date
document.getElementById('db').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// Sparkles
(()=>{const c=document.getElementById('spks');for(let i=0;i<15;i++){const s=document.createElement('div');s.className='spk';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';s.style.animationDuration=(2+Math.random()*2)+'s';c.appendChild(s)}})();

// ========== RENDER ==========
function R(){
  document.getElementById('ks').textContent=D.children.kyrie.stars;
  document.getElementById('ns').textContent=D.children.nella.stars;
  rS('ksv',D.children.kyrie.stars);rS('nsv',D.children.nella.stars);rH();rL();
}
function rS(id,n){const e=document.getElementById(id);const d=Math.min(Math.max(n,0),50);let h='';for(let i=0;i<d;i++)h+=`<span class="ms" style="animation-delay:${i*.03}s">⭐</span>`;if(n>50)h+=`<span style="color:var(--txt2);font-size:.8rem;margin-left:4px">+${n-50}</span>`;e.innerHTML=h}
function rH(){const e=document.getElementById('hl');if(!D.history.length){e.innerHTML='<div class="es">還沒有任何紀錄，開始集點吧！</div>';return}
e.innerHTML=D.history.slice(-30).reverse().map(h=>{const p=h.points>0;const t=new Date(h.timestamp);const ts=t.toLocaleDateString('zh-TW',{month:'short',day:'numeric'})+' '+t.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
return`<div class="hi"><div class="l"><span class="bd ${h.child}">${D.children[h.child].name}</span><div><div>${h.reason||(p?'表現良好':'需要加油')}</div><div class="rs">${h.parent} · ${ts}</div></div></div><span class="pts ${p?'pos':'neg'}">${p?'+':''}${h.points} ⭐</span></div>`}).join('')}

function rL(){
  const k=D.children.kyrie.stars,n=D.children.nella.stars,t=k+n||1;
  const kp=Math.round(k/t*100),np=Math.round(n/t*100);
  let f,s;
  if(k>=n){f={nm:'Kyrie',e:'🦁',s:k};s={nm:'Nella',e:'🦊',s:n}}else{f={nm:'Nella',e:'🦊',s:n};s={nm:'Kyrie',e:'🦁',s:k}}
  document.getElementById('tii').textContent=k===n?'🤝':'🏆';
  document.getElementById('ltt').textContent=k===n?'兩人目前平手！繼續加油！':`${f.nm} 目前領先！`;
  document.getElementById('lcs').innerHTML=`<div class="lc f1"><div class="lr">🥇</div><div class="la">${f.e}</div><div class="ln">${f.nm}</div><div class="ls">${f.s} ⭐</div><div class="lsl">累積星星</div></div><div class="vsd">V S</div><div class="lc f2"><div class="lr">🥈</div><div class="la">${s.e}</div><div class="ln">${s.nm}</div><div class="ls">${s.s} ⭐</div><div class="lsl">累積星星</div></div>`;
  document.getElementById('kb').style.width=kp+'%';document.getElementById('nb').style.width=np+'%';
  document.getElementById('kpc').textContent=kp+'%';document.getElementById('npc').textContent=np+'%';
  document.getElementById('dfv').textContent=Math.abs(k-n)+' ⭐';
}

// ========== FACE ID ==========
function uFUI(){
  const st=document.getElementById('fstxt'),h=document.getElementById('fih');
  if(fOn){st.textContent='✅ 已設定 Face ID';st.className='fst on';h.textContent='點擊後使用裝置生物辨識驗證'}
  else{st.textContent='尚未設定，請先在「設定」中啟用';st.className='fst off';h.textContent='請先到「設定」頁面中啟用 Face ID'}
}
async function cB(){if(!window.PublicKeyCredential)return false;try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()}catch{return false}}
async function regF(){
  if(!await cB()){alert('您的裝置不支援生物辨識功能。\n請確認已設定 Face ID 或指紋。');return}
  try{const ch=new Uint8Array(32);crypto.getRandomValues(ch);
  const cr=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:'集點大作戰',id:location.hostname||'localhost'},user:{id:new Uint8Array(16),name:'p@s.app',displayName:'家長'},pubKeyCredParams:[{alg:-7,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
  if(cr){localStorage.setItem(FK,'true');localStorage.setItem('fCid',btoa(String.fromCharCode(...new Uint8Array(cr.rawId))));fOn=true;uFUI();alert('✅ Face ID 設定成功！')}}catch(e){if(e.name!=='NotAllowedError')alert('設定失敗，請稍後再試。')}
}
async function authF(){
  if(!fOn){alert('請先到「設定」頁面中啟用 Face ID');return false}
  try{const ch=new Uint8Array(32);crypto.getRandomValues(ch);const o={publicKey:{challenge:ch,timeout:60000,userVerification:'required'}};
  const c=localStorage.getItem('fCid');if(c){const r=Uint8Array.from(atob(c),x=>x.charCodeAt(0));o.publicKey.allowCredentials=[{id:r,type:'public-key',transports:['internal']}]}
  return !!(await navigator.credentials.get(o))}catch{return false}
}
document.getElementById('sfb').addEventListener('click',regF);
document.getElementById('fib').addEventListener('click',async()=>{if(await authF()){hL();if(lCb)lCb(sP)}});

// ========== LOCK ==========
function sL(cb){lCb=cb;pI='';sP='爸比';uPD();uPB();document.getElementById('le').textContent='';document.getElementById('lo').classList.add('active');uFUI()}
function hL(){document.getElementById('lo').classList.remove('active');lCb=null}
function uPD(){document.querySelectorAll('#pds .pd').forEach((d,i)=>d.classList.toggle('fl',i<pI.length))}
function uPB(){document.querySelectorAll('.pb').forEach(b=>b.classList.toggle('sel',b.dataset.p===sP))}
document.querySelectorAll('.pb').forEach(b=>b.addEventListener('click',()=>{sP=b.dataset.p;pI='';uPD();uPB();document.getElementById('le').textContent=''}));
document.querySelectorAll('.pk').forEach(k=>k.addEventListener('click',()=>{const v=k.dataset.k;if(!v)return;if(v==='back'){pI=pI.slice(0,-1);uPD();return}if(pI.length>=4)return;pI+=v;uPD();
if(pI.length===4)setTimeout(()=>{if(D.parents[sP]===pI){hL();if(lCb)lCb(sP)}else{document.getElementById('le').textContent='密碼錯誤，請重試';pI='';uPD()}},200)}));
document.getElementById('lcb').addEventListener('click',hL);

// ========== MODAL ==========
function oM(ch,ac){sL(pa=>{cM={ch,ac,pa};pC=1;document.getElementById('pvl').textContent='1';document.getElementById('ri').value='';document.getElementById('mt').textContent=ac==='add'?`幫 ${D.children[ch].name} 加星星 ⭐`:`扣 ${D.children[ch].name} 的星星 😢`;document.getElementById('mov').classList.add('active')})}
document.getElementById('pm').addEventListener('click',()=>{if(pC>1){pC--;document.getElementById('pvl').textContent=pC}});
document.getElementById('pp2').addEventListener('click',()=>{if(pC<20){pC++;document.getElementById('pvl').textContent=pC}});
document.getElementById('mc').addEventListener('click',()=>document.getElementById('mov').classList.remove('active'));
document.getElementById('mok').addEventListener('click',()=>{
  const{ch,ac,pa}=cM;const pts=ac==='add'?pC:-pC;
  D.children[ch].stars=Math.max(0,D.children[ch].stars+pts);
  D.history.push({child:ch,points:pts,reason:document.getElementById('ri').value.trim(),parent:pa,timestamp:Date.now()});
  sv(D);R();document.getElementById('mov').classList.remove('active');if(ac==='add')tC()});

function tC(){const e=document.getElementById('cel');e.classList.add('active');const c=['#ffd700','#ff6b9d','#64b5f6','#69f0ae','#ff8c42','#7c4dff'];let h='';for(let i=0;i<40;i++)h+=`<div class="cf" style="left:${Math.random()*100}%;background:${c[Math.floor(Math.random()*c.length)]};animation-delay:${Math.random()*.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;top:-10px"></div>`;e.innerHTML=h;setTimeout(()=>{e.classList.remove('active');e.innerHTML=''},2000)}

// ========== TABS ==========
function sT(tab){
  if(tab==='settings'){sL(()=>{cTab='settings';shT()});return}
  cTab=tab;shT();
}
function shT(){
  document.getElementById('home').classList.toggle('hid',cTab!=='home');
  document.getElementById('lbd').classList.toggle('active',cTab==='leaderboard');
  document.getElementById('ssc').classList.toggle('active',cTab==='settings');
  document.getElementById('n1').classList.toggle('act',cTab==='home');
  document.getElementById('n2').classList.toggle('act',cTab==='leaderboard');
  document.getElementById('n3').classList.toggle('act',cTab==='settings');
}
function cR(){if(confirm('確定要清除所有資料嗎？此操作無法復原！')){D=gD();sv(D);R();alert('資料已清除')}}

uFUI();R();
</script>
